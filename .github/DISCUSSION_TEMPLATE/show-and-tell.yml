# ───────────────────────────────────────────────────────────────────
#  BREEZIL - Show and tell discussion form
#  Path in this repo:  .github/DISCUSSION_TEMPLATE/show-and-tell.yml
# ───────────────────────────────────────────────────────────────────
title: "[Show and tell]: "
body:
  - type: markdown
    attributes:
      value: |
        Built something with `@breezil/hypixel-utils`? Show it off. We love seeing what people make. 🎉
  - type: textarea
    id: what
    attributes:
      label: What did you build?
      placeholder: Describe your project, tool, bot, or setup.
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link
      placeholder: Repo, video, screenshot, or live demo.
  - type: input
    id: used
    attributes:
      label: Which data or helpers did you use?
      placeholder: "e.g. formatRankTag, BedWars prestiges, the shop prices"

